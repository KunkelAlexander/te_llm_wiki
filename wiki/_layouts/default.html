<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/pagefind/pagefind-ui.css' | relative_url }}">
  <style>
    body { font-family: -apple-system, Segoe UI, Helvetica, Arial, sans-serif; max-width: 780px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; color: #1a1a1a; }
    nav a { margin-right: 1rem; }
    a { color: #0a5c36; }
    blockquote { color: #444; border-left: 3px solid #ddd; margin-left: 0; padding-left: 1rem; }
    #search { margin: 1.5rem 0; }
    footer { margin-top: 3rem; font-size: 0.85rem; color: #777; }
  </style>
</head>
<body>
  <nav>
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/topics/index.html' | relative_url }}">Topics</a>
    <a href="{{ '/sources/index.html' | relative_url }}">Sources</a>
  </nav>
  <div id="search"></div>
  <script src="{{ '/pagefind/pagefind-ui.js' | relative_url }}"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      if (window.PagefindUI) {
        new PagefindUI({ element: "#search", showSubResults: true });
      }
    });
  </script>
  <hr>
  {{ content }}
  <footer>
    Generated from T&amp;E publications. Every claim above should cite a
    <a href="{{ '/sources/index.html' | relative_url }}">source page</a> with a link to the
    original publication.
  </footer>
</body>
</html>
