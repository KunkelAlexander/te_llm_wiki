title: T&E Policy Wiki
description: >
  A topic-based reference to Transport & Environment's published research, tracking how
  T&E's positions, arguments, and estimates have evolved across its publications over time.
baseurl: "/te_llm_wiki"  # matches the repo name for project-page GitHub Pages

markdown: kramdown
plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default

exclude:
  - AGENT_INSTRUCTIONS.md
  - Gemfile
  - Gemfile.lock
  - README.md
  - topics/DEDUP_INDEX.md
